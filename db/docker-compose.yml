version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_devsu
    restart: unless-stopped
    environment:
      POSTGRES_USER: devsu
      POSTGRES_PASSWORD: devsu_2026
      POSTGRES_DB: ext_devsu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
